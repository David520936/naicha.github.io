<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>请我喝奶茶</title>
<style>
*{box-sizing:border-box;}
body{
  margin:0;
  min-height:100vh;
  font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  background:url(BJQ.jpg) center center / cover no-repeat fixed;
  padding:20px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container{
  max-width:375px;
  width:100%;
  background:rgba(255,255,255,0.35);
  border-radius:24px;
  padding:40px 30px;
  box-shadow:0 10px 40px rgba(0,0,0,0.1);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.4);
  text-align:center;
}
.title{
  font-size:26px;
  color:#ff4a94;
  font-weight:bold;
  margin-bottom:12px;
}
.desc{
  font-size:15px;
  color:#444;
  margin-bottom:10px;
  line-height:1.5;
}
.desc:last-of-type{
  margin-bottom:30px;
}
.qrcode-box{
  width:240px;
  height:240px;
  margin:0 auto 28px;
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.5);
  background:#fff;
}
.qrcode-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.input-box{
  width:100%;
  padding:14px 16px;
  font-size:16px;
  border:1px solid rgba(255,255,255,0.4);
  border-radius:12px;
  text-align:center;
  margin-bottom:16px;
  outline:none;
  background:rgba(255,255,255,0.6);
}
.input-box:focus{
  border-color:#ff4a94;
}
.btn{
  width:100%;
  padding:16px;
  font-size:17px;
  font-weight:bold;
  color:#fff;
  background:linear-gradient(90deg,#ff4a94,#ff6666);
  border:none;
  border-radius:14px;
  cursor:pointer;
  box-shadow:0 6px 15px rgba(255,74,148,0.3);
}
.btn:active{
  transform:scale(0.98);
}
</style>
</head>

<body>
<div class="container">
  <div class="title">💖 哥哥请我喝杯奶茶吧</div>
  <div class="desc">打赏 8.80 元后提交微信昵称审核</div>
  <div class="desc">长按图中打赏码即可打赏 💖</div>

  <div class="qrcode-box">
    <img src="DSM.jpg" alt="收款码">
  </div>

  <input type="text" class="input-box" id="nick" placeholder="打赏完后请输入你的微信昵称">
  <button class="btn" onclick="submit()">去提交，等待审核哦哥哥</button>
</div>

<script>
function submit(){
  const name = document.getElementById('nick').value.trim();
  if(!name){
    alert('哥哥请输入你的昵称哦~');
    return;
  }
  localStorage.setItem('pay_nick', name);
  location.href = 'success1.html';
}
</script>
</body>
</html>
