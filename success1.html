<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打赏审核</title>
<style>
*{box-sizing:border-box;}
body{
  margin:0;
  min-height:100vh;
  font-family: "PingFang SC","Microsoft YaHei",sans-serif;
  background:url(BJQ.jpg) center center / cover no-repeat fixed;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.box{
  background:rgba(255,255,255,0.93);
  border-radius:24px;
  padding:40px 30px;
  max-width:350px;
  width:100%;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.1);
  backdrop-filter:bl(10px);
}
.wait{
  font-size:18px;
  color:#666;
  margin:30px 0;
}
.qrcode-box{
  width:260px;
  height:260px;
  margin:0 auto 20px;
  border-radius:16px;
  overflow:hidden;
  border:1px solid #f0f0f0;
  display:none;
}
.qrcode-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.btn{
  background:linear-gradient(90deg,#ff4a94,#ff6666);
  color:white;
  border:none;
  padding:16px;
  border-radius:14px;
  font-size:16px;
  font-weight:bold;
  width:100%;
  cursor:pointer;
  margin-top:10px;
}
.success-tip{
  font-size:20px;
  color:#ff4a94;
  font-weight:bold;
  margin-bottom:20px;
  display:none;
}
</style>
</head>

<body>

<div class="box">
  <div class="success-tip" id="okTip">✅ 谢谢哥哥打赏的奶茶！</div>

  <div class="qrcode-box" id="qrcodeBox">
    <img src="WXQ.jpg" alt="专属二维码">
  </div>

  <div class="wait" id="waitTxt">⌛ 哥哥打赏的香甜奶茶配送中...</div>

  <button class="btn" onclick="location.reload()">刷新查看结果</button>
</div>

<script>
// 你在这里添加通过的昵称
const allowList = [
  "张三",
  "李四",
  "王五",
  "饶大伟"
];

const nick = localStorage.getItem('pay_nick');

if (!nick) {
  alert("妹妹想喝奶茶啦哥哥打赏完记得输入微信昵称哈");
  location.href = "index.html";
}
else if (allowList.includes(nick)) {
  document.getElementById("waitTxt").style.display = "none";
  document.getElementById("okTip").style.display = "block";
  document.getElementById("qrcodeBox").style.display = "block";
}
</script>

</body>
</html>
